<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="island" class="island collapsed" role="status" aria-live="polite" aria-label="Orbit AI assistant status" aria-expanded="false">
    <!-- Collapsed pill view — three-zone layout -->
    <div class="pill">
      <div class="pill-left">
        <svg class="mascot mascot-claude" width="24" height="16" viewBox="0 0 24 16" fill="none" aria-hidden="true">
          <g class="mascot-fill">
            <rect x="4" y="1" width="16" height="4" />
            <rect x="2" y="5" width="20" height="3" />
            <rect x="4" y="8" width="16" height="4" />
            <rect x="6" y="12" width="2" height="3" />
            <rect x="9" y="12" width="2" height="4" />
            <rect x="14" y="12" width="2" height="4" />
            <rect x="17" y="12" width="2" height="3" />
          </g>

          <g class="mascot-cutout">
            <rect x="8" y="3" width="2" height="3" />
            <rect x="14" y="3" width="2" height="3" />
          </g>
        </svg>
      </div>
      <div class="pill-center"></div>
      <div class="pill-right">
        <div class="status-dot"></div>
        <!--<span class="status-text" aria-live="assertive">Waiting...</span>-->
      </div>
    </div>

    <!-- Expanded detail view -->
    <div class="detail">
      <div class="detail-header">
        <span class="session-cwd"></span>
        <!--<button class="close-btn" type="button" aria-label="Collapse" onclick="event.stopPropagation(); collapseIsland()">x</button>-->
      </div>
      <!-- Current session stats -->
      <div class="detail-status"></div>
      <div class="detail-tools"></div>
      <div class="detail-tokens"></div>
      <div class="detail-model"></div>

      <div class="onboarding-section" style="display:none">
        <div class="section-title" data-i18n="section.setup">Setup</div>
        <div class="onboarding-status-row">
          <div class="onboarding-status-dot status-dot"></div>
          <div class="onboarding-status-text"></div>
        </div>
        <div class="onboarding-actions">
          <button class="btn-retry" type="button" aria-label="Retry Orbit setup" onclick="event.stopPropagation(); handleOnboardingRetry()" data-i18n="onboarding.retry">Retry</button>
        </div>
      </div>

      <div class="active-section">
        <div class="section-title" data-i18n="section.active">Active</div>
        <div class="active-list"></div>
      </div>

      <!-- Permission approval -->
      <div class="permission-section" style="display:none">
        <div class="permission-tool"></div>
        <div class="permission-message"></div>
        <div class="permission-actions"></div>
      </div>

      <!-- History -->
      <div class="history-section">
        <div class="section-title" data-i18n="section.recent">Recent</div>
        <div class="history-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
