<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit 权限提示</title>
  <link rel="stylesheet" href="permission-dialog.css">
</head>
<body>
  <div class="overlay">
    <main class="dialog" role="dialog" aria-modal="true" aria-labelledby="permission-title">
      <p class="eyebrow">Orbit 需要额外权限</p>
      <h1 id="permission-title">需要访问 Claude Code 配置</h1>
      <p class="lead">Orbit 需要读取并更新 Claude Code 配置，才能完成自动接入与状态同步。</p>
      <p class="detail">
        请允许 Orbit 访问 <code>~/.claude/settings.json</code>。如果你更希望手动执行，也可以复制 CLI 命令后在终端运行。
      </p>
      <div class="actions">
        <button id="open-settings" class="primary" type="button">打开系统设置</button>
        <button id="copy-command" class="secondary" type="button">复制CLI命令</button>
      </div>
      <p id="feedback" class="feedback" aria-live="polite"></p>
    </main>
  </div>

  <script type="module" src="permission-dialog.js"></script>
</body>
</html>
